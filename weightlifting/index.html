        <!-- 모바일용 헤더 아래 배너 제거 -->
        
        <div class="container">
            <h1>웨이트리프팅 동작 상관관계</h1>
            <div class="unit-selector">
                <div class="control-buttons">
                    <div class="storage-buttons">
                        <button type="button" class="save-btn">저장</button>
                        <button type="button" class="load-btn">열기</button>
                        <button type="button" class="share-btn">공유</button>
                    </div>
                    <div class="unit-buttons">
                        <button type="button" class="unit-btn active" data-unit="kg">KG</button>
                        <button type="button" class="unit-btn" data-unit="lb">LB</button>
                    </div>
                </div>
            </div>
            <div class="calculator-grid calculator-grid--movement">
                <section class="calculator-card calculator-card--movement calculator-card--clean-and-jerk">
                    <header class="section-header">
                        <h2>클린 앤 저크</h2>
                    </header>
                    <div class="calculator-input">
                        <div class="weight-input-container">
                            <div class="input-with-unit">
                                <input type="text" id="clean-and-jerk" class="weight-input" placeholder="무게(kg)">
                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="clean-and-jerk-result">
                    </div>
                </section>

                <section class="calculator-card calculator-card--movement calculator-card--snatch">
                    <header class="section-header">
                        <h2>스내치</h2>
                    </header>
                    <div class="calculator-input">
                        <div class="weight-input-container">
                            <div class="input-with-unit">
                                <input type="text" id="snatch" class="weight-input" placeholder="무게(kg)">
                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="snatch-result">
                    </div>
                </section>

                <section class="calculator-card calculator-card--movement calculator-card--clean">
                    <header class="section-header">
                        <h2>클린</h2>
                    </header>
                    <div class="calculator-input">
                        <div class="weight-input-container">
                            <div class="input-with-unit">
                                <input type="text" id="clean" class="weight-input" placeholder="무게(kg)">
                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="clean-result">
                    </div>
                </section>

                <section class="calculator-card calculator-card--movement calculator-card--jerk">
                    <header class="section-header">
                        <h2>저크</h2>
                    </header>
                    <div class="calculator-input">
                        <div class="weight-input-container">
                            <div class="input-with-unit">
                                <input type="text" id="jerk" class="weight-input" placeholder="무게(kg)">
                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="jerk-result">
                    </div>
                </section>

                <section class="calculator-card calculator-card--movement calculator-card--squat">
                    <header class="section-header">
                        <h2>백 스쿼트</h2>
                    </header>
                    <div class="calculator-input">
                        <div class="weight-input-container">
                            <div class="input-with-unit">
                                <input type="text" id="back-squat" class="weight-input" placeholder="무게(kg)">
                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="back-squat-result">
                    </div>
                </section>

                <section class="calculator-card calculator-card--movement calculator-card--squat">
                    <header class="section-header">
                        <h2>프론트 스쿼트</h2>
                    </header>
                    <div class="calculator-input">
                        <div class="weight-input-container">
                            <div class="input-with-unit">
                                <input type="text" id="front-squat" class="weight-input" placeholder="무게(kg)">
                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="front-squat-result">
                    </div>
                </section>

                <section class="calculator-card calculator-card--movement calculator-card--deadlift">
                    <header class="section-header">
                        <h2>데드리프트</h2>
                    </header>
                    <div class="calculator-input">
                        <div class="weight-input-container">

                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="deadlift-result">
                    </div>
                </section>

                <section class="calculator-card calculator-card--movement calculator-card--push-press">
                    <header class="section-header">
                        <h2>푸시 프레스</h2>
                    </header>
                    <div class="calculator-input">

                                <span class="unit-display">kg</span>
                            </div>
                            <div class="converted-weight"></div>
                        </div>
                    </div>
                    <div class="calculator-results calculator-results--movement" id="push-press-result">
                    </div>
                </section>
            </div>
            <div id="toast-container"></div>
