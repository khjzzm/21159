        .no-rep-wrapper {

            padding: 40px 20px;
        }

        .no-rep-inner {

            font-weight: 900;
            color: #e0fd53;

        .no-rep-title {

            color: #f9fafb;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 16px;
        }

        .no-rep-desc {
            font-size: 16px;
            color: #6b7684;
            margin: 0 0 48px;
            line-height: 1.6;
        }

        .no-rep-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .no-rep-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .no-rep-btn.primary {
            background: #e0fd53;
            color: #1a1a1a;
        }

        .no-rep-btn.primary:hover {
            background: #c8e019;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 253, 83, 0.3);
        }

        .no-rep-btn.secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #b0b8c1;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .no-rep-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            color: #f9fafb;
        }

        @media (max-width: 768px) {
            .no-rep-wrapper {
                min-height: 100vh;
            }

            .no-rep-code {
                font-size: 80px;
                letter-spacing: -2px;
            }

            .no-rep-title {
                font-size: 22px;
                letter-spacing: 1px;
            }

            .no-rep-desc {
                font-size: 14px;
                margin-bottom: 36px;
            }

            .no-rep-actions {
                flex-direction: column;
                align-items: center;
            }

            .no-rep-btn {
                width: 100%;
                max-width: 260px;
                padding: 12px 24px;
                font-size: 14px;
            }
        }
